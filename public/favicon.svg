<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="10" fill="#02040a"/>
  <!-- Outer glow ring -->
  <circle cx="32" cy="32" r="26" stroke="#00d4ff" stroke-width="1.2" stroke-opacity="0.35"/>
  <!-- Globe circle -->
  <circle cx="32" cy="32" r="20" stroke="#00d4ff" stroke-width="1.8" stroke-opacity="0.9"/>
  <!-- Latitude lines -->
  <ellipse cx="32" cy="32" rx="20" ry="8"  stroke="#00d4ff" stroke-width="1"   stroke-opacity="0.55"/>
  <ellipse cx="32" cy="32" rx="20" ry="14" stroke="#00d4ff" stroke-width="0.8" stroke-opacity="0.35"/>
  <!-- Vertical meridian -->
  <ellipse cx="32" cy="32" rx="10" ry="20" stroke="#00d4ff" stroke-width="1"   stroke-opacity="0.55"/>
  <!-- Center vertical axis -->
  <line x1="32" y1="12" x2="32" y2="52" stroke="#00d4ff" stroke-width="0.7" stroke-opacity="0.3"/>
  <!-- Horizontal equator -->
  <line x1="12" y1="32" x2="52" y2="32" stroke="#00d4ff" stroke-width="0.7" stroke-opacity="0.3"/>
  <!-- Cyan dot – hotspot -->
  <circle cx="32" cy="32" r="2.8" fill="#00d4ff" opacity="0.95"/>
  <circle cx="32" cy="32" r="4.5" stroke="#00d4ff" stroke-width="0.8" stroke-opacity="0.5"/>
  <!-- Small arc — attack arc decoration -->
  <path d="M 20 24 Q 32 14 44 24" stroke="#ff2d2d" stroke-width="1.4" stroke-opacity="0.8" stroke-dasharray="2 2" fill="none"/>
  <!-- Tiny origin dot -->
  <circle cx="20" cy="24" r="1.5" fill="#ff2d2d" opacity="0.9"/>
  <!-- Tiny target dot -->
  <circle cx="44" cy="24" r="1.5" fill="#00d4ff" opacity="0.9"/>
</svg>
